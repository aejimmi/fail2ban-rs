name: Release

on:
  push:
    tags:
      - "v[0-9]+.[0-9]+.[0-9]+"

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always
  CARGO_INCREMENTAL: "0"

jobs:
  build:
    name: Build ${{ matrix.os_arch }}
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os_arch: linux-amd64
            runner: ubuntu-latest
            rust_target: x86_64-unknown-linux-musl
          - os_arch: linux-arm64
            runner: ubuntu-24.04-arm
            rust_target: aarch64-unknown-linux-musl

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Get version from tag
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          echo "VERSION=$VERSION" >> $GITHUB_ENV

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rust_target }}

      - name: Install Zig
        uses: mlugg/setup-zig@v2

      - name: Install cargo-zigbuild
        uses: taiki-e/install-action@v2
        with:
          tool: cargo-zigbuild

      - name: Install Rust target
        run: rustup target add ${{ matrix.rust_target }}

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2
        with:
          prefix-key: "release-${{ matrix.os_arch }}"

      - name: Build
        run: cargo zigbuild --release --target ${{ matrix.rust_target }}

      - name: Strip binary
        run: |
          if command -v llvm-strip >/dev/null 2>&1; then
            llvm-strip target/${{ matrix.rust_target }}/release/fail2ban-rs
          elif command -v strip >/dev/null 2>&1; then
            strip target/${{ matrix.rust_target }}/release/fail2ban-rs
          fi

      - name: Package
        run: |
          ARTIFACT="fail2ban-rs-${VERSION}-${{ matrix.os_arch }}"
          mkdir -p dist/${ARTIFACT}
          cp target/${{ matrix.rust_target }}/release/fail2ban-rs dist/${ARTIFACT}/
          cp dist/fail2ban-rs.service dist/${ARTIFACT}/
          cp config/default.toml dist/${ARTIFACT}/config.toml
          cp LICENSE dist/${ARTIFACT}/ 2>/dev/null || true
          cp README.md dist/${ARTIFACT}/ 2>/dev/null || true
          cd dist
          tar -czf ${ARTIFACT}.tar.gz ${ARTIFACT}
          sha256sum ${ARTIFACT}.tar.gz > ${ARTIFACT}.tar.gz.sha256

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: ${{ matrix.os_arch }}
          path: dist/fail2ban-rs-${{ env.VERSION }}-${{ matrix.os_arch }}.tar.gz*

  release:
    name: Create GitHub Release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v8
        with:
          path: artifacts
          merge-multiple: true

      - name: List artifacts
        run: ls -la artifacts/

      - name: Create Release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/*
          generate_release_notes: true
